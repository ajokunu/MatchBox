# Kubernetes NetworkPolicies for MatchBox SOC
# Implements network segmentation across all namespaces.
# Compliance: ISO 27001 A.8.3/A.8.20/A.8.22, NIST 800-53 AC-4/SC-7
#
# Policy: Default-deny ingress AND egress per namespace, then explicit allow rules.
# Egress: DNS (UDP 53) allowed everywhere; HTTPS (443) allowed for namespaces
# that need internet (opencti connectors, thehive/cortex analyzers).
# kube-system traffic (DNS, Traefik) is allowed via namespace selectors.

---
# ============================================================
# SHARED NAMESPACE — OpenSearch, Redis, RabbitMQ, MinIO, NFS
# ============================================================

# Default deny all ingress in shared namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: shared
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# OpenSearch (9200): Allow from wazuh, thehive, opencti, monitoring
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-opensearch
  namespace: shared
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: opensearch
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wazuh
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: thehive
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: opencti
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9200
        - protocol: TCP
          port: 9300

---
# Redis (6379): Allow from opencti only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis
  namespace: shared
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: opencti
      ports:
        - protocol: TCP
          port: 6379

---
# RabbitMQ (5672, 15672): Allow from opencti only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rabbitmq
  namespace: shared
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: opencti
      ports:
        - protocol: TCP
          port: 5672
        - protocol: TCP
          port: 15672
    # Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 15692

---
# MinIO (9000): Allow from opencti and thehive
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-minio
  namespace: shared
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: opencti
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: thehive
      ports:
        - protocol: TCP
          port: 9000

---
# NFS Server (2049): Allow from thehive (Cortex shared storage)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nfs
  namespace: shared
spec:
  podSelector:
    matchLabels:
      app: nfs-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: thehive
      ports:
        - protocol: TCP
          port: 2049

---
# ============================================================
# WAZUH NAMESPACE — Manager, Dashboard, Agents
# ============================================================

# Default deny all ingress in wazuh namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: wazuh
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Wazuh Manager (1514, 1515, 55000): Allow from agents + dashboard (same ns)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wazuh-manager
  namespace: wazuh
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wazuh-manager
  policyTypes:
    - Ingress
  ingress:
    # Agent log ingestion and registration.
    # The agent DaemonSet runs with hostNetwork: true, so its connections originate
    # from the NODE host IP, which a podSelector does NOT match (the CNI treats
    # hostNetwork traffic as node traffic). Admit BOTH:
    #   (a) in-cluster pods (dashboard, etc.) via podSelector, and
    #   (b) the node/host source via ipBlock on the agent ports 1514/1515.
    # The ipBlock covers the k3s pod CIDR (10.42.0.0/16) and the Lima VM/node
    # ranges. CONFIRM the real node CIDR with `kubectl get nodes -o wide` and the
    # Lima network; widen/narrow the ipBlock below to match your cluster.
    - from:
        - podSelector: {}
        - ipBlock:
            cidr: 10.42.0.0/16   # k3s default pod CIDR (hostNetwork pods surface as node IP within this)
        - ipBlock:
            cidr: 192.168.5.0/24  # Lima VZ user-mode network (node host IP)
      ports:
        - protocol: TCP
          port: 1514
        - protocol: TCP
          port: 1515
    # Server API (55000): pods only — agents use 1514/1515, not the API port.
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 55000

---
# Wazuh Dashboard (5601): Allow from Traefik ingress (kube-system)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-wazuh-dashboard
  namespace: wazuh
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wazuh-dashboard
  policyTypes:
    - Ingress
  ingress:
    # Only Traefik (not the whole busy kube-system namespace) may reach the dashboard.
    # namespaceSelector + podSelector in the SAME peer = AND (kube-system AND traefik).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 5601

---
# ============================================================
# THEHIVE NAMESPACE — TheHive, Cortex
# ============================================================

# Default deny all ingress in thehive namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: thehive
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# TheHive (9000): Allow from Traefik ingress + Wazuh (w2thive integration)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-thehive
  namespace: thehive
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: thehive
  policyTypes:
    - Ingress
  ingress:
    # Traefik (scoped, not all of kube-system) + Wazuh (w2thive integration).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wazuh
      ports:
        - protocol: TCP
          port: 9000

---
# Cortex (9001): Allow from Traefik ingress + TheHive (same namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cortex
  namespace: thehive
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cortex
  policyTypes:
    - Ingress
  ingress:
    # Traefik (scoped, not all of kube-system) + same-namespace pods (TheHive).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9001

---
# ============================================================
# OPENCTI NAMESPACE — Platform, Worker, Connectors
# ============================================================

# Default deny all ingress in opencti namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: opencti
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# OpenCTI Platform (4000): Allow from Traefik ingress + workers/connectors (same ns)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-opencti
  namespace: opencti
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: opencti
  policyTypes:
    - Ingress
  ingress:
    # Traefik (scoped, not all of kube-system) + same-namespace pods (worker/connectors).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 4000

---
# ============================================================
# MONITORING NAMESPACE — Prometheus, Grafana, Alertmanager
# ============================================================

# Default deny all ingress in monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Grafana (3000): Allow from Traefik ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Ingress
  ingress:
    # Only Traefik (scoped) may reach Grafana, not all of kube-system.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - protocol: TCP
          port: 3000

---
# Prometheus (9090): Allow from Grafana (same namespace) + internal scraping
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9090

---
# Alertmanager (9093): Allow from Prometheus (same namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alertmanager
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9093

---
# Allow Prometheus to scrape metrics from all namespaces
# Applied in each namespace that has exporters
# Ports: 9100 (node-exporter) + application-specific metrics ports
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: wazuh
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9100   # node-exporter
        - protocol: TCP
          port: 55000  # Wazuh Manager API (metrics)

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: thehive
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9100   # node-exporter
        - protocol: TCP
          port: 9000   # TheHive metrics
        - protocol: TCP
          port: 9001   # Cortex metrics

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: opencti
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9100   # node-exporter
        - protocol: TCP
          port: 4000   # OpenCTI metrics
        - protocol: TCP
          port: 14269  # OpenCTI health

---
# Shared namespace exporters: Redis exporter (9121), MinIO metrics (9000),
# node-exporter (9100). Without this, default-deny-ingress in `shared` blocks
# Prometheus from scraping them. RabbitMQ:15692 is already covered by allow-rabbitmq.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: shared
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9100   # node-exporter
        - protocol: TCP
          port: 9121   # Redis exporter (bitnami/redis metrics)
        - protocol: TCP
          port: 9000   # MinIO metrics

---
# ============================================================
# EGRESS POLICIES — Default-deny + explicit allow per namespace
# ============================================================

# --- SHARED NAMESPACE EGRESS ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: shared
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
# Shared: Allow DNS + internal pod-to-pod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-shared
  namespace: shared
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS resolution (kube-dns in kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Pod-to-pod within shared namespace
    - to:
        - podSelector: {}

---
# --- WAZUH NAMESPACE EGRESS ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: wazuh
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
# Wazuh egress — WAVE-2 (finding 33): split namespace-wide egress into per-app rules so
# each workload reaches only what it needs (state-of-the-art least-privilege egress),
# instead of one podSelector:{} block giving the dashboard the same egress as the manager.
#
# (a) DNS for EVERY pod in the namespace (kept broad — all workloads resolve names).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-wazuh-dns
  namespace: wazuh
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Pod-to-pod within wazuh namespace (manager<->agents, dashboard->manager API).
    - to:
        - podSelector: {}

---
# (b) Manager-only egress: the manager ships alerts to the shared OpenSearch (9200).
# The dashboard does NOT need to reach OpenSearch directly, so this is scoped to the
# manager pod by app label.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-wazuh-manager
  namespace: wazuh
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wazuh-manager
  policyTypes:
    - Egress
  egress:
    # OpenSearch in shared namespace (alert indexing).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shared
      ports:
        - protocol: TCP
          port: 9200

---
# (c) Dashboard-only egress: the Wazuh dashboard queries the shared OpenSearch (9200)
# for alert data. Scoped to the dashboard pod by app label.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-wazuh-dashboard
  namespace: wazuh
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wazuh-dashboard
  policyTypes:
    - Egress
  egress:
    # OpenSearch in shared namespace (dashboard reads wazuh-alerts-* indices).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shared
      ports:
        - protocol: TCP
          port: 9200

---
# --- THEHIVE NAMESPACE EGRESS ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: thehive
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
# TheHive: Allow DNS + shared (OpenSearch, MinIO, NFS) + HTTPS for Cortex analyzers
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-thehive
  namespace: thehive
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Pod-to-pod within thehive namespace
    - to:
        - podSelector: {}
    # Shared namespace: OpenSearch, MinIO, NFS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shared
      ports:
        - protocol: TCP
          port: 9200   # OpenSearch
        - protocol: TCP
          port: 9000   # MinIO
        - protocol: TCP
          port: 2049   # NFS
    # HTTPS egress for Cortex analyzers (VirusTotal, etc.) — INTERNET ONLY.
    # `to: []` previously meant "all IPs", letting a compromised analyzer (which runs
    # third-party code on attacker-supplied observables) pivot to in-cluster services,
    # the node, or the 169.254/16 link-local/metadata range. Restrict to public IPs by
    # excepting the cluster pod CIDR, service CIDR, link-local, and RFC1918 ranges.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8        # k3s pod (10.42/16) + service (10.43/16) + RFC1918
              - 172.16.0.0/12     # RFC1918
              - 192.168.0.0/16    # RFC1918 + Lima node network
              - 169.254.0.0/16    # link-local / cloud metadata
      ports:
        - protocol: TCP
          port: 443

---
# --- OPENCTI NAMESPACE EGRESS ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: opencti
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
# OpenCTI: Allow DNS + shared (OpenSearch, Redis, RabbitMQ, MinIO) + HTTPS for connectors
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-opencti
  namespace: opencti
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Pod-to-pod within opencti namespace
    - to:
        - podSelector: {}
    # Shared namespace: OpenSearch, Redis, RabbitMQ, MinIO
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: shared
      ports:
        - protocol: TCP
          port: 9200   # OpenSearch
        - protocol: TCP
          port: 6379   # Redis
        - protocol: TCP
          port: 5672   # RabbitMQ
        - protocol: TCP
          port: 9000   # MinIO
    # HTTPS egress for threat feed connectors (MITRE, AlienVault, AbuseIPDB, etc.)
    # — INTERNET ONLY. Connectors are SSRF-prone (they fetch attacker-influenced
    # data), so the same hardening as thehive applies: except cluster/service,
    # link-local/metadata, and RFC1918 ranges from the 0.0.0.0/0 allow.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8        # k3s pod (10.42/16) + service (10.43/16) + RFC1918
              - 172.16.0.0/12     # RFC1918
              - 192.168.0.0/16    # RFC1918 + Lima node network
              - 169.254.0.0/16    # link-local / cloud metadata
      ports:
        - protocol: TCP
          port: 443

---
# --- MONITORING NAMESPACE EGRESS ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress

---
# Monitoring: Allow DNS + scrape all namespaces on metrics ports
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-monitoring
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Pod-to-pod within monitoring namespace
    - to:
        - podSelector: {}
    # Scrape all namespaces on metrics ports
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 9090   # Prometheus
        - protocol: TCP
          port: 9093   # Alertmanager
        - protocol: TCP
          port: 9100   # node-exporter
        - protocol: TCP
          port: 9121   # Redis exporter (bitnami/redis metrics)
        - protocol: TCP
          port: 9200   # OpenSearch
        - protocol: TCP
          port: 4000   # OpenCTI
        - protocol: TCP
          port: 9000   # TheHive / MinIO metrics
        - protocol: TCP
          port: 9001   # Cortex
        - protocol: TCP
          port: 55000  # Wazuh Manager API
        - protocol: TCP
          port: 14269  # OpenCTI health
        - protocol: TCP
          port: 15692  # RabbitMQ metrics
