# kube-prometheus-stack Helm Values — Monitoring for MatchBox SOC
# Chart: prometheus-community/kube-prometheus-stack
# Chart version: --version 62.7.0   (pin the chart; bump deliberately)
#
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts/
#   helm install monitoring prometheus-community/kube-prometheus-stack \
#     -n monitoring --version 62.7.0 -f kube-prometheus-values.yaml

# --- Prometheus ---
prometheus:
  prometheusSpec:
    # Resource limits — slim config
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "384Mi"
        cpu: "250m"
    # Retention — 15 days (save disk).
    # retentionSize kept well below the PVC size: Prometheus needs headroom above
    # retentionSize for the head block, WAL, and compaction (~2x). 2GB on a 5Gi PVC
    # leaves room so WAL/compaction can't push past the volume before size-based
    # deletion kicks in.
    retention: "15d"
    retentionSize: "2GB"
    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "local-path"
          resources:
            requests:
              storage: "5Gi"
    # Scrape all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

# --- Grafana ---
grafana:
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "384Mi"
      cpu: "250m"
  # Grafana auth: require login. Anonymous Viewer access is DISABLED — even though
  # Traefik basic-auth fronts Grafana, anonymous access gives any holder of the one
  # shared basic-auth password unauthenticated, unaccountable Viewer access to all
  # SOC detection data. Authenticate with the soc-grafana-secrets admin account
  # (provision named per-user accounts for accountability).
  # allow_embedding stays true so dashboards can still be iframed into the SOC
  # Command Center; embedding now relies on Grafana's own session/auth.
  grafana.ini:
    security:
      allow_embedding: true
    auth.anonymous:
      enabled: false
  # Admin credentials — password from K8s Secret (never hardcoded)
  adminUser: admin
  admin:
    existingSecret: soc-grafana-secrets
    userKey: admin-user
    passwordKey: admin-password
  # Mount the OpenSearch CA so the datasource can verify the server cert
  # (instead of skipping verification). ConfigMap opensearch-ca-cert must exist in
  # the monitoring namespace with key ca.crt (see opensearch-ca-cert config below).
  extraConfigmapMounts:
    - name: opensearch-ca
      configMap: opensearch-ca-cert
      mountPath: /etc/ssl/opensearch
      readOnly: true
  # Persistence
  persistence:
    enabled: true
    size: "2Gi"
    storageClassName: "local-path"
  # Skip init-chown-data — PVC already has correct ownership from initial install
  initChownData:
    enabled: false
  # Inject OpenSearch password from K8s Secret as env var for datasource provisioning.
  # The opensearch-grafana-auth Secret (key OPENSEARCH_PASSWORD = the value of
  # soc-shared-secrets/opensearch-password) is created by the deploy scripts
  # (scripts lane) before this chart is installed — it is NOT created here.
  envFromSecrets:
    - name: opensearch-grafana-auth
  # Data sources — add OpenSearch for Wazuh dashboards
  additionalDataSources:
    - name: OpenSearch-Wazuh
      type: elasticsearch
      url: https://opensearch-cluster-master.shared.svc.cluster.local:9200
      database: "wazuh-alerts-*"
      basicAuth: true
      basicAuthUser: admin
      jsonData:
        timeField: "timestamp"
        esVersion: "2.11.0"  # OpenSearch version
        logMessageField: "full_log"
        logLevelField: "rule.level"
        # Verify the OpenSearch server cert (was tlsSkipVerify: true → MITM risk on
        # the admin credential). Trust the SOC CA mounted at /etc/ssl/opensearch.
        tlsSkipVerify: false
        tlsAuthWithCACert: true
      secureJsonData:
        basicAuthPassword: "$__env{OPENSEARCH_PASSWORD}"
        # CA certificate read from the mounted ConfigMap so Grafana can validate
        # the self-signed OpenSearch cert.
        tlsCACert: "$__file{/etc/ssl/opensearch/ca.crt}"
  # Pre-provision Wazuh community dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: "wazuh"
          orgId: 1
          folder: "Wazuh SOC"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/wazuh
  # Dashboard JSON ConfigMaps
  dashboardsConfigMaps:
    wazuh: "grafana-wazuh-dashboards"

# --- Alertmanager ---
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: "64Mi"
        cpu: "25m"
      limits:
        memory: "128Mi"
        cpu: "50m"
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: "local-path"
          resources:
            requests:
              storage: "1Gi"
  # Routing/receivers. Without a real receiver the chart's defaultRules fire into a
  # null sink and alerting is effectively silent. Default to a webhook so OOM /
  # pod-down / OpenSearch-red alerts are actually delivered; point WEBHOOK_URL at a
  # local notifier (or replace with a Slack/email receiver as needed).
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "soc-default"
    receivers:
      - name: "soc-default"
        webhook_configs:
          # Replace with the SOC notifier endpoint (e.g. an Alertmanager→Discord/Slack
          # bridge). Kept as a placeholder so the receiver is wired, not silent.
          - url: "http://alert-notifier.monitoring.svc.cluster.local:9094/alert"
            send_resolved: true

# --- Resource-limit core exporters (kept ENABLED — they are needed) ---
# kubeStateMetrics + nodeExporter stay enabled; we only cap their resources to fit
# the slim RAM budget. (Previously mislabeled "Disable components we don't need".)
kubeStateMetrics:
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

nodeExporter:
  resources:
    requests:
      memory: "32Mi"
      cpu: "25m"
    limits:
      memory: "64Mi"
      cpu: "100m"

# Disable default Kubernetes dashboards (we use custom SOC ones)
defaultRules:
  create: true
  rules:
    general: true
    kubernetesSystem: true
    node: true
    # Disable unused rules to reduce Prometheus memory
    alertmanager: false
    configReloaders: false
    etcd: false
    kubeControllerManager: false
    kubeScheduler: false
    kubeProxy: false
