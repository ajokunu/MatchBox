# Wazuh Helm Chart Values — SIEM/XDR Platform (REFERENCE ONLY)
#
# SOURCE OF TRUTH: Wazuh is deployed via the RAW MANIFESTS in manager/, dashboard/,
# and agents/ (applied by deploy-stack.sh). This values file is NOT consumed by the
# deploy flow; it documents the intended shape for a future migration to a real chart.
# Keep it in sync with the raw manifests to avoid drift, or delete it if the chart
# path is abandoned. (There is no dedicated indexer/ manifest — the Wazuh indexer is
# the shared OpenSearch cluster in the `shared` namespace.)

# --- Wazuh Manager ---
manager:
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  # Use external OpenSearch (shared namespace)
  indexer:
    url: "https://opensearch-cluster-master.shared.svc.cluster.local:9200"
  # TheHive integration — forward high-severity alerts.
  # Reconciled to match the raw manifests: the integration is currently DISABLED
  # (ossec.conf has the <integration> block commented out — the w2thive.py script
  # is not yet deployed). Flip enabled to true here only when the integration is
  # actually wired in configmap-ossec.yaml.
  integration:
    thehive:
      enabled: false
      url: "http://thehive.thehive.svc.cluster.local:9000"
      # API key set via Kubernetes Secret
      alertLevel: 7  # Forward alerts at level 7 and above (when enabled)
  # Persistent storage for rules, decoders, and agent keys
  persistence:
    enabled: true
    size: "5Gi"
    storageClass: "local-path"

# --- Wazuh Dashboard ---
dashboard:
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"
  # Point to shared OpenSearch
  opensearch:
    url: "https://opensearch-cluster-master.shared.svc.cluster.local:9200"

# --- Wazuh Agent (DaemonSet) ---
agent:
  # DaemonSet runs one agent per k3s node
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "384Mi"
      cpu: "200m"
  # Manager connection
  manager:
    host: "wazuh-manager.wazuh.svc.cluster.local"
    port: 1514
  # Monitoring modules
  modules:
    fileIntegrity: true       # FIM on critical paths
    rootkitDetection: true    # Rootcheck
    vulnerabilityScanner: true # CVE scanning
    logCollector: true         # Syslog collection
    securityConfigAssessment: true # CIS benchmarks
