# Wazuh Manager — StatefulSet deployment
# SIEM/XDR core: receives agent logs, evaluates rules, triggers alerts
apiVersion: v1
kind: Service
metadata:
  name: wazuh-manager
  namespace: wazuh
  labels:
    app.kubernetes.io/name: wazuh-manager
spec:
  selector:
    app.kubernetes.io/name: wazuh-manager
  ports:
    - name: agent-events
      port: 1514
      targetPort: 1514
    - name: agent-registration
      port: 1515
      targetPort: 1515
    - name: api
      port: 55000
      targetPort: 55000
  clusterIP: None
---
# Stable ClusterIP Service for the 55000 Server API.
# The headless Service above gives the StatefulSet its stable network identity,
# but a headless lookup returns the pod IP directly, which churns during rollouts.
# The dashboard talks to the API via this VIP so it survives pod IP changes.
apiVersion: v1
kind: Service
metadata:
  name: wazuh-manager-api
  namespace: wazuh
  labels:
    app.kubernetes.io/name: wazuh-manager
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: wazuh-manager
  ports:
    - name: api
      port: 55000
      targetPort: 55000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager
  namespace: wazuh
  labels:
    app.kubernetes.io/name: wazuh-manager
spec:
  serviceName: wazuh-manager
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wazuh-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wazuh-manager
    spec:
      automountServiceAccountToken: false
      # Pod-level hardening baseline (Contract Section 7). The Wazuh manager image
      # runs its daemons as root internally, so runAsNonRoot is not yet feasible here,
      # but we still apply the default seccomp profile to shrink the syscall surface.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # InitContainer seeds the PVC-backed /var/ossec/etc ONLY when it is empty
      # (first boot / fresh volume), then always overlays our custom ossec.conf.
      # Persisting etc on a PVC (not emptyDir) keeps client.keys / agent identities
      # across restarts so agents do not have to re-enroll (audit finding: emptyDir
      # wiped client.keys on every restart). On subsequent boots the existing etc is
      # preserved and we only refresh ossec.conf from the ConfigMap.
      initContainers:
        - name: init-config
          image: wazuh/wazuh-manager:4.14.3
          imagePullPolicy: IfNotPresent  # version-tagged; avoid re-pull churn
          command: ["sh", "-c"]
          args:
            - |
              # Seed image defaults only when the persistent etc volume is empty,
              # so client.keys and other runtime state survive restarts.
              if [ ! -f /etc-init/.seeded ]; then
                cp -a /var/ossec/etc/. /etc-init/ &&
                touch /etc-init/.seeded
              fi &&
              # Always overlay our managed ossec.conf (ConfigMap is the source of truth)
              cp /tmp/custom-config/ossec.conf /etc-init/ossec.conf &&
              mkdir -p /etc-init/shared &&
              [ -f /etc-init/shared/ar.conf ] || touch /etc-init/shared/ar.conf
          # NOTE: the Wazuh manager image's /var/ossec tree is owned by the wazuh
          # user with restrictive perms; `cp -a` (preserving ownership) needs root
          # WITH DAC_OVERRIDE/CHOWN. Dropping ALL caps makes even root fail with
          # "Permission denied", so we keep the image's default caps here (seccomp
          # still constrains the syscall surface).
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config-staging
              mountPath: /tmp/custom-config
            - name: etc-writable
              mountPath: /etc-init
      containers:
        - name: wazuh-manager
          image: wazuh/wazuh-manager:4.14.3
          imagePullPolicy: IfNotPresent
          # The Wazuh manager runs wazuh-control which starts its daemons as root and
          # drops to the wazuh user via setuid — this needs the image's default caps
          # and privilege escalation. Dropping ALL caps / disabling setuid breaks the
          # manager. seccomp RuntimeDefault still constrains the syscall surface; full
          # rootless hardening is tracked for wave 2.
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 1514
              name: agent-events
            - containerPort: 1515
              name: agent-reg
            - containerPort: 55000
              name: api
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: INDEXER_URL
              value: "https://opensearch-cluster-master.shared.svc.cluster.local:9200"
            - name: INDEXER_USERNAME
              value: "admin"
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  # wazuh-ns mirror of the OpenSearch admin password — secretKeyRefs
                  # cannot cross namespaces, so soc-shared-secrets (shared ns) is not
                  # reachable here. Fail closed if the key is absent.
                  name: soc-wazuh-secrets
                  key: indexer-password
            # WAVE-2 HARDENING: 'none' for this one intra-cluster hop only (manager
            # Filebeat -> shared OpenSearch). The wazuh-manager image regenerates
            # filebeat.yml from its env template on every boot and does NOT wire
            # ssl.certificate_authorities, so a 'certificate' mode rejects our self-signed
            # CA. The hop is single-node, same-cluster, and locked down by NetworkPolicy.
            # To re-enable verification: mount a ConfigMap filebeat.yml (subPath) that sets
            # ssl.certificate_authorities: ['/etc/ssl/opensearch/root-ca.pem'].
            - name: FILEBEAT_SSL_VERIFICATION_MODE
              value: "none"
          volumeMounts:
            - name: data
              mountPath: /var/ossec/data
            - name: etc-writable
              mountPath: /var/ossec/etc
            - name: custom-rules
              mountPath: /var/ossec/etc/rules/custom
            - name: custom-decoders
              mountPath: /var/ossec/etc/decoders/custom
            - name: opensearch-certs
              mountPath: /etc/ssl/opensearch
              readOnly: true
          # Startup probe gives the manager time to boot all daemons before
          # liveness begins, so a slow first boot does not trip a restart loop.
          startupProbe:
            exec:
              # Ready when the CORE daemons are up. Plain `wazuh-control status` exits
              # non-zero if ANY (incl. optional/disabled: clusterd, maild, integratord,
              # csyslogd) daemon is down, which would keep a healthy manager un-Ready.
              command:
                - sh
                - -c
                - 'for d in wazuh-analysisd wazuh-remoted wazuh-db wazuh-apid; do /var/ossec/bin/wazuh-control status | grep -q "$d is running" || exit 1; done'
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          # Exec probes inspect actual daemon health (analysisd, remoted, wazuh-db,
          # indexer connector) instead of merely confirming port 1514 is bound —
          # a port-only check can pass while the manager is degraded and alerts
          # have silently stopped flowing.
          readinessProbe:
            exec:
              # Ready when the CORE daemons are up. Plain `wazuh-control status` exits
              # non-zero if ANY (incl. optional/disabled: clusterd, maild, integratord,
              # csyslogd) daemon is down, which would keep a healthy manager un-Ready.
              command:
                - sh
                - -c
                - 'for d in wazuh-analysisd wazuh-remoted wazuh-db wazuh-apid; do /var/ossec/bin/wazuh-control status | grep -q "$d is running" || exit 1; done'
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              # Ready when the CORE daemons are up. Plain `wazuh-control status` exits
              # non-zero if ANY (incl. optional/disabled: clusterd, maild, integratord,
              # csyslogd) daemon is down, which would keep a healthy manager un-Ready.
              command:
                - sh
                - -c
                - 'for d in wazuh-analysisd wazuh-remoted wazuh-db wazuh-apid; do /var/ossec/bin/wazuh-control status | grep -q "$d is running" || exit 1; done'
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
        - name: config-staging
          configMap:
            name: wazuh-manager-config
        # NOTE: 'etc-writable' is intentionally NOT declared here — it is provided
        # by the 'etc-writable' volumeClaimTemplate below so /var/ossec/etc (and
        # therefore client.keys / agent identities) persists across pod restarts.
        - name: custom-rules
          configMap:
            name: wazuh-custom-rules
        - name: custom-decoders
          configMap:
            name: wazuh-custom-decoders
        - name: opensearch-certs
          secret:
            secretName: opensearch-certs
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "local-path"
        resources:
          requests:
            storage: 5Gi
    # Persist /var/ossec/etc (client.keys, ossec.conf, internal options) so agent
    # registration identities survive manager restarts/rescheduling instead of
    # being wiped from an emptyDir and forcing every agent to re-enroll.
    - metadata:
        name: etc-writable
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "local-path"
        resources:
          requests:
            storage: 1Gi
