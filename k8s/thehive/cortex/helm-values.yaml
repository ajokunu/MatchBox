# Cortex Helm Values — Automated Analysis Engine
# Chart: strangebee/cortex (https://strangebee.github.io/helm-charts/)
# Chart version: --version 1.0.0   (pin the chart; bump deliberately)
#
# Install:
#   helm install cortex strangebee/cortex -n thehive --version 1.0.0 -f cortex/helm-values.yaml

cortex:
  # Pin the image (CLAUDE.md: "all images pinned, no :latest").
  image:
    registry: docker.io
    repository: thehiveproject/cortex
    tag: "3.1.8"

  # Resource limits — slim config
  resources:
    requests:
      memory: "384Mi"
      cpu: "100m"
    limits:
      memory: "768Mi"
      cpu: "500m"

  # Pod/container hardening. Cortex's entrypoint historically switched users via
  # `su`, so we do NOT force runAsNonRoot at the pod level; instead we drop all
  # capabilities, block privilege escalation, and apply the RuntimeDefault seccomp
  # profile so the analyzer-spawning process runs with a minimal kernel surface.
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault

  # Cortex uses its own Elasticsearch index (separate from TheHive).
  # OpenSearch is TLS-only + authenticated, so use https://, supply admin creds,
  # and trust the SOC CA mounted from the opensearch-ca-cert ConfigMap (thehive ns).
  elasticsearch:
    url: "https://opensearch-cluster-master.shared.svc.cluster.local:9200"
    indexPrefix: "cortex"
    username: "admin"
    passwordFrom:
      secretKeyRef:
        name: soc-shared-secrets
        key: opensearch-password
    ssl:
      enabled: true
      verify: true
      certificateAuthorities: "/etc/ssl/opensearch/ca.crt"

  # Mount the OpenSearch CA (thehive-ns opensearch-ca-cert ConfigMap, key ca.crt).
  extraVolumes:
    - name: opensearch-ca
      configMap:
        name: opensearch-ca-cert
  extraVolumeMounts:
    - name: opensearch-ca
      mountPath: /etc/ssl/opensearch
      readOnly: true

  # Kubernetes job runner — how Cortex executes analyzers
  job:
    # Cortex creates K8s Jobs for each analyzer/responder invocation
    runner: "kubernetes"
    kubernetes:
      # Namespace where analyzer jobs run
      namespace: "thehive"
      # ServiceAccount with permission to create Jobs (see rbac.yaml)
      serviceAccount: "cortex-job-runner"
      # NFS volume for sharing data between Cortex and analyzer pods.
      # NOTE: verify the strangebee/cortex chart actually supports
      # cortex.job.kubernetes.sharedVolume; if not, this block is ignored and the
      # shared volume must be configured via the chart's documented key instead.
      sharedVolume:
        nfs:
          server: "nfs-server.shared.svc.cluster.local"
          path: "/exports/cortex"
      # Resource limits for individual analyzer pods
      jobResources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "300m"

  # Analyzer configuration.
  # NOTE: the strangebee/cortex chart may NOT template an `analyzers` list — in
  # most Cortex deployments analyzers are enabled post-install via the Cortex UI/API
  # (Organization -> Analyzers) once API keys are configured. Keep this list as the
  # intended set; if the chart ignores it, enable these the same way post-install.
  analyzers:
    # VirusTotal — file/hash/IP/domain reputation
    - name: "VirusTotal_GetReport_3_1"
      enabled: true
      config:
        # API key set via Secret
        auto_extract_artifacts: true

    # AbuseIPDB — IP reputation
    - name: "AbuseIPDB_1_0"
      enabled: true
      config:
        max_age_in_days: 30

    # URLhaus — malicious URL detection
    - name: "URLhaus_2_0"
      enabled: true

    # MaxMind GeoIP — IP geolocation
    - name: "MaxMind_GeoIP_4_0"
      enabled: true

    # FileInfo — basic file analysis (hash, MIME, size)
    - name: "FileInfo_8_0"
      enabled: true

# Service
service:
  type: ClusterIP
  port: 9001

# Persistent storage
persistence:
  enabled: true
  size: "2Gi"
  storageClass: "local-path"
