# Traefik IngressRoutes for MatchBox SOC
# Exposes all SOC dashboards under soc.homelab.local with path-based routing.
#
# Prerequisites (all created by the deploy scripts BEFORE these routes are applied):
#   - Traefik installed via helm (k3s built-in disabled).
#   - /etc/hosts: 127.0.0.1 soc.homelab.local
#   - soc-tls-cert  (kube-system, kubernetes.io/tls) — created by
#     scripts/generate-certs.sh (openssl; CN soc.homelab.local).
#   - soc-auth-secret (kube-system) — htpasswd users for the basic-auth middleware,
#     created by deploy-stack.sh's deploy_ingress() from $SOC_DASHBOARD_PASSWORD.
#   This manifest references both secrets but does NOT create them (scripts lane owns
#   secret creation; see the IMPLEMENTATION-CONTRACT canonical names).
#
# Install Traefik:
#   helm repo add traefik https://traefik.github.io/charts
#   helm install traefik traefik/traefik -n kube-system \
#     --set resources.requests.memory=64Mi \
#     --set resources.limits.memory=128Mi

---
# TLS minimum version — enforce TLS 1.2+
# Compliance: NIST 800-53 SC-13 (Cryptographic Protection)
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: default
  namespace: kube-system
spec:
  minVersion: VersionTLS12
  cipherSuites:
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
    - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256

---
# Default TLS certificate store — all IngressRoutes use this cert
apiVersion: traefik.io/v1alpha1
kind: TLSStore
metadata:
  name: default
  namespace: kube-system
spec:
  defaultCertificate:
    secretName: soc-tls-cert

---
# BasicAuth middleware — adds a password layer on top of each app's own auth.
# The `soc-auth-secret` (key: users, bcrypt htpasswd line) is created by
# deploy-stack.sh deploy_ingress() BEFORE these routes are applied — fail-fast if the
# credential env var is unset. Do NOT create it here. Generated with:
#   htpasswd -nbB "$SOC_AUTH_USER" "$SOC_DASHBOARD_PASSWORD"
#   kubectl create secret generic soc-auth-secret -n kube-system \
#     --from-literal=users='<htpasswd-line>' --dry-run=client -o yaml | kubectl apply -f -
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: soc-basic-auth
  namespace: kube-system
spec:
  basicAuth:
    secret: soc-auth-secret

---
# Wazuh Dashboard — /wazuh
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wazuh-dashboard
  namespace: wazuh
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`soc.homelab.local`) && PathPrefix(`/wazuh`)
      kind: Rule
      services:
        - name: wazuh-dashboard
          port: 5601
          scheme: https
      middlewares:
        - name: soc-basic-auth
          namespace: kube-system
  tls:
    secretName: soc-tls-cert
    domains:
      - main: soc.homelab.local

---
# TheHive — /thehive
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: thehive
  namespace: thehive
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`soc.homelab.local`) && PathPrefix(`/thehive`)
      kind: Rule
      services:
        - name: thehive
          port: 9000
      middlewares:
        - name: soc-basic-auth
          namespace: kube-system
  tls:
    secretName: soc-tls-cert

---
# Cortex — /cortex
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cortex
  namespace: thehive
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`soc.homelab.local`) && PathPrefix(`/cortex`)
      kind: Rule
      services:
        - name: cortex
          port: 9001
      middlewares:
        - name: soc-basic-auth
          namespace: kube-system
  tls:
    secretName: soc-tls-cert

---
# OpenCTI — /opencti
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: opencti
  namespace: opencti
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`soc.homelab.local`) && PathPrefix(`/opencti`)
      kind: Rule
      services:
        - name: opencti
          port: 4000
      middlewares:
        - name: soc-basic-auth
          namespace: kube-system
  tls:
    secretName: soc-tls-cert

---
# Grafana — /grafana
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`soc.homelab.local`) && PathPrefix(`/grafana`)
      kind: Rule
      services:
        - name: monitoring-grafana
          port: 3000
      middlewares:
        - name: soc-basic-auth
          namespace: kube-system
  tls:
    secretName: soc-tls-cert
