# OPTIONAL cert-manager path for soc-tls-cert.
#
# CANONICAL PATH (default): cert-manager is NOT installed (keeps RAM at 0 for PKI).
# The TLS secrets are generated with openssl by scripts/generate-certs.sh, which
# creates:
#   - soc-tls-cert      (kube-system, kubernetes.io/tls) for the Traefik ingress
#   - opensearch-certs  (shared + wazuh) for OpenSearch transport/http TLS
#   - the opensearch-ca-cert ConfigMaps (root CA) consumed across namespaces
# deploy-stack.sh runs that script before applying the ingress. Do NOT rely on a
# `generate-tls-cert.sh` script — it does not exist; the canonical script is
# scripts/generate-certs.sh.
#
# This file is provided ONLY as a documented optional upgrade: if you choose to run
# cert-manager, install it and apply this manifest to auto-issue/renew soc-tls-cert
# instead of the openssl path. It is NOT applied by deploy-stack.sh.
#
#   helm install cert-manager jetstack/cert-manager --set installCRDs=true
#   kubectl apply -f k8s/ingress/self-signed-issuer.yaml
---
# cert-manager self-signed issuer (only if cert-manager is installed)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
# Certificate resource — auto-generates and renews the TLS cert
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: soc-tls-cert
  namespace: kube-system
spec:
  secretName: soc-tls-cert
  duration: 8760h  # 1 year
  renewBefore: 720h  # Renew 30 days before expiry
  isCA: false
  privateKey:
    algorithm: RSA
    size: 2048
  subject:
    organizations:
      - MatchBox SOC
  commonName: soc.homelab.local
  dnsNames:
    - soc.homelab.local
    - "*.soc.homelab.local"
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
