# NFS Server for Cortex Shared Filesystem
# Cortex requires a shared filesystem accessible by both the Cortex pod
# and the analyzer/responder Job pods it creates.
# Without this, analyzer jobs fail silently because they can't read input
# or write output.
#
# This deploys a lightweight NFS server (nfs-ganesha) as a pod in the
# shared namespace, with a PersistentVolume backing it.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-data
  namespace: shared
spec:
  # SINGLE-NODE CONSTRAINT: this PVC uses local-path (node-local hostPath) and is
  # ReadWriteOnce. The nfs-server Deployment that exports it must stay on the node
  # that holds this volume — on a multi-node cluster the volume (and exported data)
  # would be orphaned if the pod rescheduled elsewhere. For multi-node, convert
  # nfs-server to a StatefulSet with a stable PVC or pin it with nodeSelector/affinity.
  accessModes:
    - ReadWriteOnce
  storageClassName: "local-path"
  resources:
    requests:
      storage: "5Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: shared
  labels:
    app: nfs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      containers:
        - name: nfs-ganesha
          image: erichough/nfs-server:2.2.1
          imagePullPolicy: IfNotPresent  # third-party image; avoid re-pull churn
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          ports:
            - containerPort: 2049
              name: nfs
              protocol: TCP
          env:
            - name: NFS_EXPORT_0
              value: "/exports/cortex *(rw,sync,no_subtree_check,root_squash)"
          volumeMounts:
            - name: nfs-data
              mountPath: /exports/cortex
          # Scoped capabilities instead of full privileged:true.
          # Kernel NFS needs SYS_ADMIN (mount/export), DAC_READ_SEARCH (read any
          # exported file), and SETPCAP (drop/raise caps during startup). This is a
          # narrower grant than privileged. If the erichough/nfs-server image still
          # requires privileged for kernel nfsd/rpc modules in this environment,
          # restore privileged:true here AND relocate NFS to a dedicated PSS-privileged
          # namespace so the exemption does not weaken the shared data namespace.
          securityContext:
            privileged: false
            allowPrivilegeEscalation: true  # SYS_ADMIN-driven mounts need this
            capabilities:
              drop: ["ALL"]
              add: ["SYS_ADMIN", "DAC_READ_SEARCH", "SETPCAP"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: nfs-data
          persistentVolumeClaim:
            claimName: nfs-data
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: shared
  labels:
    app: nfs-server
spec:
  selector:
    app: nfs-server
  ports:
    - port: 2049
      targetPort: 2049
      protocol: TCP
  type: ClusterIP
