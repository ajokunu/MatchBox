# Shared PersistentVolumeClaims
# These PVCs use k3s local-path-provisioner for automatic volume provisioning
# on the single-node cluster. In a multi-node setup, replace with NFS or
# a distributed storage class.
---
# Cortex shared data — NFS-backed PV for analyzer job I/O.
# RWM is valid here because the backing store is the in-cluster nfs-server.
# That server is itself backed by a local-path (RWO, node-local) PVC, so the whole
# RWM guarantee depends on the single-node assumption documented above and in
# k8s/storage/nfs-server.yaml (the nfs-server pod must not reschedule off its node).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: cortex-shared-nfs
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteMany  # Multiple pods (Cortex + analyzer jobs) need simultaneous access
  nfs:
    server: nfs-server.shared.svc.cluster.local
    path: "/exports/cortex"
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cortex-shared-data
  namespace: thehive
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""  # Use pre-provisioned NFS PV
  volumeName: cortex-shared-nfs
  resources:
    requests:
      storage: 2Gi
