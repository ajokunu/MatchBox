# (alienvault/abuseipdb/virustotal) and the TheHive cortex key must each be a real,
# unique value — identical/duplicated values mean the connectors and integrations
# will not actually authenticate. validate_secrets() should flag duplicates, not just
# the literal CHANGE_ME marker.
