# ============================================================================
# SOPS-ENCRYPTED SECRETS — PLACEHOLDER / STRUCTURE ONLY (NOT YET ENCRYPTED)
# ============================================================================
#
# This is the committable, GitOps-safe home for the SOC secrets. The PLAIN
# k8s/shared/secrets.yaml stays gitignored and is NEVER committed.
#
# ⚠️ DO NOT HAND-ENCRYPT THIS FILE. The real encrypted content is generated by:
#       make secrets-init
#   which runs scripts/setup-sops.sh: it creates an age key OUTSIDE the repo
#   ($SOPS_AGE_KEY_FILE, default ~/.config/sops/age/keys.txt), writes the PUBLIC
#   recipient into .sops.yaml, then runs `sops --encrypt secrets.yaml > secrets.enc.yaml`,
#   replacing this placeholder. Per .sops.yaml (encrypted_regex '^(data|stringData)$')
#   only the data values are encrypted — the key NAMES and structure stay readable.
#
# At deploy time, deploy-stack.sh decrypts on the fly (fail-fast if the age key is
# missing):
#   sops --decrypt k8s/shared/secrets.enc.yaml | kubectl apply -f -
#
# The blocks below mirror secrets.yaml EXACTLY so the canonical secret/key names are
# locked in. Every value is the literal "ENC[placeholder]" until `make secrets-init`
# replaces them with real `ENC[AES256_GCM,data:...]` ciphertext. Never put a real
# secret value in this file by hand.
# ----------------------------------------------------------------------------
---
apiVersion: v1
kind: Secret
metadata:
  name: soc-shared-secrets
  namespace: shared
  labels:
    app.kubernetes.io/part-of: matchbox-soc
type: Opaque
data:
  opensearch-password: ENC[placeholder]
  redis-password: ENC[placeholder]
  rabbitmq-password: ENC[placeholder]
  rabbitmq-erlang-cookie: ENC[placeholder]
  minio-root-user: ENC[placeholder]
  minio-root-password: ENC[placeholder]
---
apiVersion: v1
kind: Secret
metadata:
  name: soc-opencti-secrets
  namespace: opencti
  labels:
    app.kubernetes.io/part-of: matchbox-soc
type: Opaque
data:
  admin-password: ENC[placeholder]
  admin-token: ENC[placeholder]
  alienvault-api-key: ENC[placeholder]
  abuseipdb-api-key: ENC[placeholder]
  virustotal-api-key: ENC[placeholder]
  health-access-key: ENC[placeholder]
---
apiVersion: v1
kind: Secret
metadata:
  name: soc-thehive-secrets
  namespace: thehive
  labels:
    app.kubernetes.io/part-of: matchbox-soc
type: Opaque
data:
  # api-key: removed from the template — nothing consumes it (the Cortex link uses
  # cortex-api-key; TheHive's own API key is generated in-app post-login). Re-add
  # here only if a manifest starts referencing soc-thehive-secrets/api-key.
  play-secret: ENC[placeholder]
  cortex-api-key: ENC[placeholder]
---
apiVersion: v1
kind: Secret
metadata:
  name: soc-grafana-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: matchbox-soc
type: Opaque
data:
  admin-password: ENC[placeholder]
  admin-user: ENC[placeholder]
---
apiVersion: v1
kind: Secret
metadata:
  name: soc-wazuh-secrets
  namespace: wazuh
  labels:
    app.kubernetes.io/part-of: matchbox-soc
type: Opaque
data:
  wazuh-api-password: ENC[placeholder]
  # indexer-password: removed — dead key. The manager/dashboard use
  # soc-shared-secrets/opensearch-password as the single source of truth for the
  # indexer credential. Re-add only if a separate indexer credential is ever wired.
#
# sops: ENV PLACEHOLDER — the `sops:` metadata block (recipients, mac, lastmodified)
# is written by `sops --encrypt` during `make secrets-init`. It is intentionally
# absent here because this file is a structure-only placeholder, not a real
# SOPS-encrypted document. Do not add it by hand.
