# Lima VM Definition for MatchBox
# Runs k3s Kubernetes inside a lightweight Linux VM on macOS (Apple Silicon)
#
# Usage:
#   limactl start ./lima/k3s-soc.yaml
#   export KUBECONFIG=$(limactl list k3s-soc --format '{{.Dir}}/copied-from-guest/kubeconfig.yaml')
#   kubectl get nodes

# VM image — Ubuntu 24.04 LTS (ARM64 for Apple Silicon)
images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

# Resource allocation — slim config for Mac Mini M4 (16GB total)
# macOS needs ~4-5GB, Lima overhead ~500MB, leaves ~10GB for the VM
cpus: 4
memory: "10GiB"
disk: "120GiB"

# VZ framework — Apple's native virtualization, near-native performance on M-series
vmType: "vz"
# Rosetta 2 — enables running x86_64 container images on ARM transparently
rosetta:
  enabled: true
  binfmt: true

# Mount the k8s manifests directory into the VM for easy access
mounts:
  - location: "~/DonnieBot/SecurityCenter"
    mountPoint: "/home/{{.User}}/SecurityCenter"
    writable: false

# Port forwarding — expose k3s API and service ports to the macOS host.
# hostIP is pinned to 127.0.0.1 so these bind to loopback only (never the LAN),
# durable against any global Lima default override.
portForwards:
  # k3s API server — for kubectl from macOS
  - guestPort: 6443
    hostIP: "127.0.0.1"
    hostPort: 6443
    proto: tcp
  # HTTP ingress (Traefik)
  - guestPort: 80
    hostIP: "127.0.0.1"
    hostPort: 80
    proto: tcp
  # HTTPS ingress (Traefik)
  - guestPort: 443
    hostIP: "127.0.0.1"
    hostPort: 443
    proto: tcp
  # Wazuh agent communication
  - guestPort: 1514
    hostIP: "127.0.0.1"
    hostPort: 1514
    proto: tcp
  # Wazuh agent registration
  - guestPort: 1515
    hostIP: "127.0.0.1"
    hostPort: 1515
    proto: tcp
  # Wazuh API (for MCP server on macOS)
  - guestPort: 55000
    hostIP: "127.0.0.1"
    hostPort: 55000
    proto: tcp

# Per-VM provisioning parameters consumed by the shared provision-k3s.sh script.
env:
  SWAP_SIZE: "4G"
  K3S_SYSTEM_RESERVED: "cpu=200m,memory=256Mi"
  K3S_EVICTION_HARD: "memory.available<200Mi"
  K3S_EVICTION_SOFT: "memory.available<500Mi"

# Provisioning — runs on first boot. Shared with k3s-soc-minimal.yaml so version
# pins / kubeconfig mode / hardening live in one place (provision-k3s.sh).
provision:
  - mode: system
    file: provision-k3s.sh

# Copy kubeconfig to host for kubectl access from macOS
copyToHost:
  - guest: "/etc/rancher/k3s/k3s.yaml"
    host: "{{.Dir}}/copied-from-guest/kubeconfig.yaml"

# Note: soc.homelab.local is resolved on the macOS HOST via /etc/hosts
# (127.0.0.1 soc.homelab.local); ingress is reached through the 80/443 port-forwards.
