<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
  <title>MatchBox SOC</title>
  <script>
    /* Anti-FOUC: set only data-theme before paint; CSS vars (app.css) drive the
       background so there is no inline body-style to set and later clear. */
    (function(){var t=localStorage.getItem('matchbox-theme')||'light';document.documentElement.setAttribute('data-theme',t)})();
  </script>
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <div style="display:contents">%sveltekit.body%</div>
</body>
</html>
