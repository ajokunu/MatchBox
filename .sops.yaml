# SOPS configuration for MatchBox secrets.
#
# This file is regenerated by `scripts/setup-sops.sh`, which fills in the real
# `age:` recipient (a PUBLIC age1... key) from the keypair it creates at
# $SOPS_AGE_KEY_FILE (default ~/.config/sops/age/keys.txt), OUTSIDE this repo.
#
# Until you run `./scripts/setup-sops.sh` (or `make secrets-init`), the recipient
# below is a placeholder and encryption will fail — that is intentional: agents
# never generate or commit a private key.
#
# Only the `data` and `stringData` fields of secret manifests are encrypted, so the
# manifest structure (kind, metadata, namespace) stays readable in git diffs.
creation_rules:
  - path_regex: k8s/shared/secrets\.enc\.yaml$
    encrypted_regex: '^(data|stringData)$'
    # REPLACE_WITH_AGE_PUBLIC_RECIPIENT — written by scripts/setup-sops.sh.
    age: age1placeholder0000000000000000000000000000000000000000000000000000
